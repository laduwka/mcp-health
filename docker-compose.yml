services:
  fitness-mcp:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
    env_file:
      - .env
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  datasette:
    image: datasetteproject/datasette:latest
    command: >
      datasette serve
      /data/fitness.db /data/off_products.db
      --host 0.0.0.0 --port 8001
      --setting default_page_size 50
      --setting sql_time_limit_ms 5000
      --setting max_returned_rows 1000
    volumes:
      - ./data:/data:ro
    ports:
      - "8001:8001"
    restart: unless-stopped

