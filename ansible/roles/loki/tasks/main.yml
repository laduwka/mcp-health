---
- name: Create loki user
  user:
    name: loki
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Create promtail user
  user:
    name: promtail
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    groups: docker,systemd-journal,adm
    append: true

- name: Create Loki directories
  file:
    path: "{{ item }}"
    state: directory
    owner: loki
    group: loki
    mode: "0755"
  loop:
    - /etc/loki
    - /var/lib/loki
    - /var/lib/loki/chunks
    - /var/lib/loki/rules
    - /var/lib/loki/compactor

- name: Create Promtail directories
  file:
    path: "{{ item }}"
    state: directory
    owner: promtail
    group: promtail
    mode: "0755"
  loop:
    - /etc/promtail
    - /var/lib/promtail

- name: Download Loki binary
  get_url:
    url: "https://github.com/grafana/loki/releases/download/v{{ loki_version }}/loki-linux-amd64.zip"
    dest: /tmp/loki-linux-amd64.zip
    mode: "0644"
  register: loki_download

- name: Install unzip
  apt:
    name: unzip
    state: present

- name: Extract Loki binary
  unarchive:
    src: /tmp/loki-linux-amd64.zip
    dest: /usr/local/bin/
    remote_src: true
    mode: "0755"
  when: loki_download.changed
  notify: restart loki

- name: Rename Loki binary
  command: mv /usr/local/bin/loki-linux-amd64 /usr/local/bin/loki
  args:
    creates: /usr/local/bin/loki
    removes: /usr/local/bin/loki-linux-amd64

- name: Download Promtail binary
  get_url:
    url: "https://github.com/grafana/loki/releases/download/v{{ loki_version }}/promtail-linux-amd64.zip"
    dest: /tmp/promtail-linux-amd64.zip
    mode: "0644"
  register: promtail_download

- name: Extract Promtail binary
  unarchive:
    src: /tmp/promtail-linux-amd64.zip
    dest: /usr/local/bin/
    remote_src: true
    mode: "0755"
  when: promtail_download.changed
  notify: restart promtail

- name: Rename Promtail binary
  command: mv /usr/local/bin/promtail-linux-amd64 /usr/local/bin/promtail
  args:
    creates: /usr/local/bin/promtail
    removes: /usr/local/bin/promtail-linux-amd64

- name: Deploy Loki config
  template:
    src: loki-config.yml.j2
    dest: /etc/loki/config.yml
    owner: loki
    group: loki
    mode: "0644"
  notify: restart loki

- name: Deploy Promtail config
  template:
    src: promtail-config.yml.j2
    dest: /etc/promtail/config.yml
    owner: promtail
    group: promtail
    mode: "0644"
  notify: restart promtail

- name: Deploy Loki systemd unit
  template:
    src: loki.service.j2
    dest: /etc/systemd/system/loki.service
    mode: "0644"
  notify: restart loki

- name: Deploy Promtail systemd unit
  template:
    src: promtail.service.j2
    dest: /etc/systemd/system/promtail.service
    mode: "0644"
  notify: restart promtail

- name: Enable and start Loki
  systemd:
    name: loki
    enabled: true
    state: started
    daemon_reload: true

- name: Enable and start Promtail
  systemd:
    name: promtail
    enabled: true
    state: started
    daemon_reload: true
