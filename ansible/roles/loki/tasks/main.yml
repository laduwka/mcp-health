---
- name: Create loki user
  user:
    name: loki
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Create Loki directories
  file:
    path: "{{ item }}"
    state: directory
    owner: loki
    group: loki
    mode: "0755"
  loop:
    - /etc/loki
    - /var/lib/loki
    - /var/lib/loki/chunks
    - /var/lib/loki/rules
    - /var/lib/loki/compactor

- name: Install unzip
  apt:
    name: unzip
    state: present

- name: Download Loki binary
  get_url:
    url: "https://github.com/grafana/loki/releases/download/v{{ loki_version }}/loki-linux-amd64.zip"
    dest: /tmp/loki-linux-amd64.zip
    mode: "0644"
  register: loki_download

- name: Extract Loki binary
  unarchive:
    src: /tmp/loki-linux-amd64.zip
    dest: /usr/local/bin/
    remote_src: true
    mode: "0755"
  when: loki_download.changed
  notify: restart loki

- name: Rename Loki binary
  command: mv /usr/local/bin/loki-linux-amd64 /usr/local/bin/loki
  args:
    creates: /usr/local/bin/loki
    removes: /usr/local/bin/loki-linux-amd64

- name: Deploy Loki config
  template:
    src: loki-config.yml.j2
    dest: /etc/loki/config.yml
    owner: loki
    group: loki
    mode: "0644"
  notify: restart loki

- name: Deploy Loki systemd unit
  template:
    src: loki.service.j2
    dest: /etc/systemd/system/loki.service
    mode: "0644"
  notify: restart loki

- name: Enable and start Loki
  systemd:
    name: loki
    enabled: true
    state: started
    daemon_reload: true

# --- Grafana Alloy (replaces Promtail) ---

- name: Stop and disable Promtail (migration cleanup)
  systemd:
    name: promtail
    enabled: false
    state: stopped
  failed_when: false

- name: Add Grafana apt signing key
  apt_key:
    url: https://apt.grafana.com/gpg.key
    state: present

- name: Add Grafana apt repository
  apt_repository:
    repo: "deb https://apt.grafana.com stable main"
    filename: grafana
    state: present

- name: Install Alloy
  apt:
    name: alloy
    state: present
    update_cache: true

- name: Add alloy user to required groups
  user:
    name: alloy
    groups: docker,adm,systemd-journal
    append: true
  notify: restart alloy

- name: Deploy Alloy config
  template:
    src: alloy-config.alloy.j2
    dest: /etc/alloy/config.alloy
    owner: alloy
    group: alloy
    mode: "0644"
  notify: restart alloy

- name: Enable and start Alloy
  systemd:
    name: alloy
    enabled: true
    state: started
    daemon_reload: true
